<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Billy TikTok Collector</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        width: 320px;
        margin: 0;
        background: #0b0d10;
        color: #f7f8f8;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.2;
      }

      p {
        margin: 6px 0 0;
        color: #a9b0ba;
        font-size: 12px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin-top: 12px;
        color: #c7ccd3;
        font-size: 11px;
        font-weight: 600;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        height: 34px;
        margin-top: 6px;
        border: 1px solid #2b313a;
        border-radius: 6px;
        background: #12161c;
        color: #f7f8f8;
        padding: 0 10px;
        font-size: 12px;
        outline: none;
      }

      input:focus {
        border-color: #6ea8fe;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        height: 36px;
        border: 1px solid #2b313a;
        border-radius: 6px;
        background: #171c23;
        color: #f7f8f8;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
      }

      button.primary {
        border-color: #2f6feb;
        background: #2f6feb;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        min-height: 18px;
        margin-top: 10px;
        color: #c7ccd3;
        font-size: 12px;
        line-height: 1.4;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-top: 12px;
      }

      .metric {
        border: 1px solid #242a33;
        border-radius: 6px;
        background: #11151a;
        padding: 8px;
      }

      .metric span {
        display: block;
        color: #89929f;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Billy TikTok Collector</h1>
      <p>Start a session on a TikTok hashtag or sound grid, scroll, then finish and send.</p>

      <label for="appUrl">Billy app URL</label>
      <input id="appUrl" value="http://127.0.0.1:8080/creator-sourcing#billy" />

      <div class="actions">
        <button id="collect" type="button">Begin Scraping Session</button>
        <button id="send" type="button" class="primary" disabled>Finish &amp; Send To Billy</button>
      </div>

      <div class="metrics">
        <div class="metric">
          <span>Creators</span>
          <strong id="creatorCount">0</strong>
        </div>
        <div class="metric">
          <span>Videos</span>
          <strong id="videoCount">0</strong>
        </div>
      </div>

      <div id="status" class="status">Open a TikTok hashtag or sound page first.</div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
